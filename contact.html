<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="author" content="Daniel Gelchu" />
    <title>Contact — Daniel Gelchu</title>
    <style>
      body {
        font-family: Georgia, serif;
        max-width: 600px;
        margin: 40px auto;
        padding: 0 20px;
        color: #1a1a1a;
        line-height: 1.6;
      }
      h1 { font-size: 1.4rem; color: #333; }
      h2 { font-size: 1rem; color: #555; border-bottom: 1px solid #ddd; padding-bottom: 4px; margin-top: 24px; }
      label { font-size: 0.95rem; }
      input[type="text"],
      input[type="email"],
      textarea {
        display: block;
        width: 100%;
        box-sizing: border-box;
        padding: 6px 8px;
        margin-top: 4px;
        margin-bottom: 14px;
        border: 1px solid #bbb;
        font-family: Georgia, serif;
        font-size: 0.95rem;
      }
      .radio-group, .checkbox-group {
        margin-bottom: 6px;
      }
      .radio-group input,
      .checkbox-group input {
        margin-right: 6px;
      }
      input[type="submit"] {
        margin-top: 16px;
        padding: 8px 24px;
        background-color: #1a73e8;
        color: #fff;
        border: none;
        cursor: pointer;
        font-size: 0.95rem;
      }
      input[type="submit"]:hover {
        background-color: #1558b0;
      }
      .back-link { display: inline-block; margin-bottom: 20px; color: #1a73e8; text-decoration: none; font-size: 0.9rem; }
      .back-link:hover { text-decoration: underline; }
      .note { font-size: 0.8rem; color: #888; margin-top: 8px; }
    </style>
  </head>
  <body>

    <a href="index.html" class="back-link">← Back to Portfolio</a>

    <h1>Contact Me</h1>
    <p>Feel free to reach out — I'll get back to you as soon as possible.</p>

    <form action="mailto:danieldg62@gmail.com" method="post" enctype="text/plain">

      <label for="name">Name</label>
      <input type="text" id="name" name="name" placeholder="Your full name" required />

      <label for="email">Email</label>
      <input type="email" id="email" name="email" placeholder="your@email.com" required />

      <h2>Gender</h2>
      <div class="radio-group">
        <input type="radio" id="male" name="gender" value="male" />
        <label for="male">Male</label>
      </div>
      <div class="radio-group">
        <input type="radio" id="female" name="gender" value="female" />
        <label for="female">Female</label>
      </div>

      <h2>Area of Interest</h2>
      <div class="checkbox-group">
        <input type="checkbox" id="frontend" name="skill" value="frontend" />
        <label for="frontend">Frontend Development</label>
      </div>
      <div class="checkbox-group">
        <input type="checkbox" id="backend" name="skill" value="backend" />
        <label for="backend">Backend Development</label>
      </div>

      <label for="message" style="margin-top: 16px; display: block;">Message</label>
      <textarea id="message" name="message" rows="5" cols="50" placeholder="Write your message here..." required></textarea>

      <input type="submit" value="Send Message" />
      <p class="note">Note: This form opens your default email client to send the message.</p>

    </form>

  </body>
</html>
